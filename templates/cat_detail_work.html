<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>{{ cat.name }} - Профіль пухнастика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

		<a href="/" class="floating-back-btn" title="Повернутися до друзів">
        <span class="icon">🐾</span>
        <span class="text">Повернутися до друзів</span>
		</a>
		
    <div class="profile-container">
        <div class="profile-actions" style="margin-bottom: 60px; text-align: center; position: relative;">
            <button class="btn profile-btn" id="pet-button" onclick="createHearts(event)">
                Погладити пухнастика ❤️
            </button>
			<div class="pet-counter">
				Нагладили: <span id="count-number">0</span> разів
			</div>
        </div>

        <div class="profile-header">
            <img src="{{ url_for('static', filename=cat.img) }}" class="profile-avatar" alt="{{ cat.name }}">

				<div class="profile-text">
					<h1 class="profile-name">{{ cat.name }}</h1>
					<span class="tag">{{ cat.role }}</span>
    
					<div class="profile-description intro-text">
						<p>{{ cat.desc }}</p>
					</div>
				</div>
        </div>

        <div class="bio-section secrets-card">
			<div class="secrets-header">
				<h3>🤫 Головні фічешки</h3>
			</div>
			<div class="secrets-content">
				<p>{{ cat.full_bio }}</p>
			</div>
		</div>
		
		<hr class="neon-divider">

        <div class="gallery-section">
            <h3>📸 Галерея пухнастика</h3>
            <div class="gallery-grid">
                {% for photo in cat.gallery %}
                <div class="gallery-item">
                    <a href="{{ url_for('static', filename=photo) }}" data-fslightbox="gallery">
                        <img src="{{ url_for('static', filename=photo) }}" alt="Фото {{ cat.name }}">
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

    
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fslightbox/3.0.9/index.min.js"></script>

    <script>
        function createHearts(event) {
            const button = event.currentTarget;
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const heart = document.createElement('span');
                    heart.classList.add('heart-particle');
                    heart.innerText = '❤️';
                    const rect = button.getBoundingClientRect();
                    heart.style.left = (rect.left + rect.width / 2) + 'px';
                    heart.style.top = (rect.top + rect.height / 2 + window.scrollY) + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 1500);
                }, i * 100);
            }
        }
		
		// Отримуємо ID кота (наприклад, pesdyuk або myshyak) з контексту Flask
			const catId = "{{ cat.id }}"; 
			const counterDisplay = document.getElementById('count-number');

		// Завантажуємо кількість погладжувань з пам'яті браузера при завантаженні сторінки
			let count = localStorage.getItem('pats_' + catId) || 0;
			counterDisplay.innerText = count;

			function createHearts(event) {
		// 1. Збільшуємо лічильник
				count++;
				counterDisplay.innerText = count;
				localStorage.setItem('pats_' + catId, count);

		// 2. Твоя стара функція створення сердечок (залишається без змін)
			const button = event.currentTarget;
			for (let i = 0; i < 6; i++) {
				setTimeout(() => {
			const heart = document.createElement('span');
					heart.classList.add('heart-particle');
					heart.innerText = '❤️';
            const rect = button.getBoundingClientRect();
					heart.style.left = (rect.left + rect.width / 2) + 'px';
					heart.style.top = (rect.top + rect.height / 2 + window.scrollY) + 'px';
					document.body.appendChild(heart);
					setTimeout(() => heart.remove(), 1500);
        }, i * 100);
    }
}
    </script>

</body>
</html>

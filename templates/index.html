<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог двох пухнастиків</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
</head>
<body>

    <header>
		<h1>🐾 Наше котяче життя</h1>
		<p class="header-subtitle">Пригоди, сон та полювання на сонячних зайчиків</p>
	</header>

    <main class="cat-container">
      {% for cat in cats %}
	<section class="cat-card {{ cat.id }}" onmousemove="spawnParticles(this, event)">
    <img src="{{ url_for('static', filename=cat.img) }}" alt="{{ cat.name }}" style="width: 100%; height: auto;">
    
    <div class="cat-info">
        <h2>{{ cat.name }}</h2>
        <span class="tag">{{ cat.role }}</span>
        <p>{{ cat.desc }}</p>
        <a href="/cat/{{ cat.id }}" 
			class="btn" 
			onclick="return mobileExplosion(this, event)" 
			style="text-decoration: none; display: inline-block;">
			{{ cat.button_text }}
		</a>
    </div>
	</section>
{% endfor %}
    </main>
	
	<section class="common-gallery-section" style="margin-top: 80px; text-align: center;">
		<h2 style="font-family: 'Unbounded', sans-serif; margin-bottom: 30px;">🐾 Разом веселіше</h2>
    
		<div class="profile-container" style="max-width: 1100px;">
			<div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            {% for photo in common_photos %}
				<div class="gallery-item">
					<a href="{{ url_for('static', filename=photo) }}" data-fslightbox="common-gallery">
						<img src="{{ url_for('static', filename=photo) }}" 
						alt="Спільне фото" 
						style="width: 100%; border-radius: 20px; transition: 0.3s;">
					</a>
				</div>
            {% endfor %}
			</div>
		</div>
	</section>

    <footer>
        <p>&copy; 2026 Зроблено з любов'ю (та шерстю) 🐱🐱</p>
    </footer>
	
	<script>
function mobileExplosion(element, event) {
    const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const card = element.closest('.cat-card');
    const url = element.getAttribute('href');

    // КІЛЬКІСТЬ: Випускаємо 45 частинок для масовості
    for (let i = 0; i < 45; i++) {
        createSingleParticle(card, event, true); 
    }

    if (isMobile) {
        event.preventDefault();
        element.style.transform = 'scale(0.9)';
        element.classList.add('btn-active');

        setTimeout(() => {
            window.location.href = url;
        }, 700); // Трохи збільшили затримку, щоб встигли розлетітися
        
        return false;
    }
    return true;
}

function createSingleParticle(card, event, isExplosion = false) {
    const particle = document.createElement('span');
    particle.classList.add('card-particle');
    
    // ЯСКРАВІСТЬ: Додаємо більше емодзі
    const icons = ['🐾', '✨', '🧶', '🐱', '❤️', '🌈', '🐟', '🎈', '🍭', '⭐'];
    particle.innerText = icons[Math.floor(Math.random() * icons.length)];

    const rect = card.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;

    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    
    // ХАОТИЧНІСТЬ ТА МАСА:
    // Якщо це вибух, розліт набагато сильніший (до 500px)
    const range = isExplosion ? 500 : 150;
    const dx = (Math.random() - 0.5) * range;
    const dy = (Math.random() - 0.5) * range;
    const size = isExplosion ? (Math.random() * 2 + 0.5) : 1.2; // Різні розміри
    const duration = isExplosion ? (Math.random() * 0.4 + 0.6) : 0.8;

    particle.style.fontSize = `${size}rem`;
    particle.style.setProperty('--dx', `${dx}px`);
    particle.style.setProperty('--dy', `${dy}px`);
    particle.style.setProperty('--rot', `${(Math.random() - 0.5) * 720}deg`);
    particle.style.animationDuration = `${duration}s`;

    card.appendChild(particle);
    setTimeout(() => particle.remove(), duration * 1000);
}

function spawnParticles(card, event) {
    // Створюємо частинку лише з шансом 10%, щоб не спамити
    if (Math.random() > 0.1) return; 
    createSingleParticle(card, event);
}

</script>

</body>
</html>
